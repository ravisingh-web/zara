name: Z.A.R.A. Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.1'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Debug + Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-fatal)
        run: flutter analyze --no-fatal-warnings || true
        continue-on-error: true

      - name: Build Debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --split-per-abi

      - name: Build Release APK (arm64)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZARA-debug-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ZARA-release-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Z.A.R.A. Build #${{ github.run_number }}"
          body: |
            ## Z.A.R.A. Auto Build 🚀
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Flutter: `${{ env.FLUTTER_VERSION }}`

            ### Download
            - **Release APK** → Production use
            - **Debug APK** → Testing/debugging
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
