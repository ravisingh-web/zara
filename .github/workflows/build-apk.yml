name: 🤖 Z.A.R.A. Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.1'
  JAVA_VERSION: '17'
  APK_PATH: 'build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk'

jobs:
  build-apk:
    name: 📦 Build Debug APK (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code        run: flutter analyze --no-fatal-warnings || true
        continue-on-error: true

      - name: 🔧 Verify Android setup
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --version || echo "Gradle check skipped"
          cd ..

      - name: 🔨 Build Debug APK
        run: |
          flutter build apk \
            --debug \
            --target-platform android-arm64 \
            --split-per-abi \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: 📋 Verify APK output
        run: |
          echo "Checking for APK..."
          if [ -f "${{ env.APK_PATH }}" ]; then
            echo "APK found: ${{ env.APK_PATH }}"
            ls -lh "${{ env.APK_PATH }}"
          else
            echo "APK not found!"
            ls -lh build/app/outputs/flutter-apk/ || true
            exit 1
          fi

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zara-debug-arm64-v8a
          path: ${{ env.APK_PATH }}
          retention-days: 7
          if-no-files-found: error

      - name: 📊 Create Build Summary
        run: |
          echo "## ✅ Z.A.R.A. APK Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | ${{ env.FLUTTER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java | ${{ env.JAVA_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Android ARM64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY          echo "### Download:" >> $GITHUB_STEP_SUMMARY
          echo "1. Actions tab → Latest run" >> $GITHUB_STEP_SUMMARY
          echo "2. Scroll to Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "3. Click zara-debug-arm64-v8a" >> $GITHUB_STEP_SUMMARY

      - name: 🎉 Build Complete
        run: |
          echo "Z.A.R.A. APK Build Successful!"
          echo "Download from: Actions → Artifacts → zara-debug-arm64-v8a"
