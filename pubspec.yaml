# pubspec.yaml
# Z.A.R.A. - Zenith Autonomous Reasoning Array
# Package: com.mahakal.zara | Version: 1.0.0+1

name: zara
description: "Z.A.R.A. - Zenith Autonomous Reasoning Array (AI Companion)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.5
  # UI & Fonts
  google_fonts: ^8.0.1
  # Utilities
  intl: ^0.20.2
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
