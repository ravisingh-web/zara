# pubspec.yaml.
# Z.A.R.A. - Zenith Autonomous Reasoning Array
# Android Only • Latest Version Support • No Hardcoded API Keys

name: zara
description: "Z.A.R.A. - Real AI Companion with Device Integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  # ========== State Management ==========
  provider: ^6.1.5+1

  # ========== Persistent Storage (API Keys) ==========
  shared_preferences: ^2.3.3

  # ========== HTTP for API Calls ==========
  http: ^1.6.0
  dio: ^5.4.0

  # ========== Google Gemini AI ==========
  google_generative_ai: ^0.4.7

  # ========== Device Metrics ==========
  battery_plus: ^6.1.0
  device_info_plus: ^11.1.0
  connectivity_plus: ^6.1.0

  # ========== Storage & Files ==========
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # ========== Camera ==========
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # ========== Location ==========
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ========== Code Analysis ==========
  analyzer: ^7.3.0
  dart_style: ^3.0.1

  # ========== Email & URLs ==========
  url_launcher: ^6.3.1

  # ========== UI & Fonts ==========
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0

  # ========== Utilities ==========
  intl: ^0.20.2
  vector_math: ^2.2.0
  audioplayers: ^6.5.1
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf

  assets:
    - assets/images/
