name: zara
description: "Z.A.R.A. v19.0 — Gemini Live API Audio-to-Audio"
publish_to: 'none'
version: 19.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  http: ^1.6.0
  web_socket_channel: ^3.0.1
  just_audio: ^0.9.40
  record: ^6.2.0
  permission_handler: ^11.3.1
  battery_plus: ^6.1.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  url_launcher: ^6.3.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
  assets:
    - assets/images/
